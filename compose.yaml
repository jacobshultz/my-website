# compose.yaml is like the script that runs when you do docker compose up, it saves you from having to
# write out huge long scripts with lots of flags

# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  nextjs-prod-standalone:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-website:prod
    container_name: my-website-prod
    ports:
      - "3000:3000"

  nextjs-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: my-website:dev
    container_name: my-website-dev
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: package.json

  nextjs-test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: my-website:dev
    container_name: my-website-test
    command:
      [
        "sh",
        "-c",
        "pnpm run test:run",
      ]
    profiles:
      - tools

  nextjs-lint:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: my-website:dev
    container_name: my-website-lint
    command:
      [
        "sh",
        "-c",
        "pnpm lint",
      ]
    profiles:
      - tools

