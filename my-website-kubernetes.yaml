apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-website
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-website
  template:
    metadata:
      labels:
        app: my-website
    spec:
      containers:
        - name: nextjs-container
          image: jacobshultz/my-website:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOSTNAME
              value: "0.0.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name:  my-website-service
  namespace: default
spec:
  type: NodePort
  selector:
    app:  my-website
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001